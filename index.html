<!DOCTYPE html>
<html>

<head>
<title>Type Tester</title>

<link rel="stylesheet" href="style.css">
<style></style>
</head>


<body>

    <p class="myTitle">TYPING SPEED TESTER</p>

    <div class="intro-div">
 <input placeholder="Type your Name" class="name js-name">
    <button class="enter js-enter">ENTER</button>

    <button class="start-button js-start-button">START TEST</button>
    <button class="restart-button js-restart-button">RESTART</button>

     <div class="timer-display-container js-timer-display-container">
 <p class="timer-display js-timer-display"></p>
    </div>
   
    </div>
   

    <p class="type-the-sen js-type-the-sen"></p>

    <p class="sentence-display js-sentence-display"></p>

    <div class="type-area-container js-type-area-container"></div>
    
   

    <p class="results js-results"></p>
    <p class="time-used js-time-used"></p>
    <p class="wpm js-wpm"></p>
    <p class="accuracy js-accuracy"></p>
     <p class="remark js-remark"></p>
   
     
    <script src="script.js"></script>

        <p class="footer-copy">© 2026 <span>NOSIBANE</span>. All rights reserved.</p>
